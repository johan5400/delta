<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Live · FOC 2026</title>
<script>var FIREBASE_DB_URL='https://foc-2026-default-rtdb.europe-west1.firebasedatabase.app';</script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@700;900&family=JetBrains+Mono:wght@700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --tb:44px;
  --bg:#07090f;--ink:#EAEEF5;--ink2:#8899B4;--ink3:#2A3A52;
  --ok:#00E5A0;--err:#FF3055;--warn:#FFB020;--gold:#FFD166;
  --blue:#2D9CFF;--purple:#9B5DE5;
  --ff:'Bebas Neue',sans-serif;
  --fc:'Barlow Condensed',sans-serif;
  --fm:'JetBrains Mono',monospace;
}
html{height:100%;overflow:hidden}
body{height:100%;overflow:hidden;background:var(--bg);color:var(--ink);font-family:var(--fc);display:flex;flex-direction:column}
.topbar{
  height:var(--tb);min-height:var(--tb);flex-shrink:0;
  display:flex;align-items:center;gap:10px;padding:0 14px;
  background:rgba(5,7,12,.99);border-bottom:1px solid rgba(255,255,255,.08);z-index:20
}
.brand{display:flex;align-items:center;gap:7px}
.brand-ico{width:26px;height:26px;border-radius:5px;background:linear-gradient(135deg,#FF5722,#FF8A00);
  display:flex;align-items:center;justify-content:center;font-family:var(--ff);font-size:16px;color:#fff}
.brand-lbl{font-family:var(--ff);font-size:18px;letter-spacing:3px;color:#fff}
.live-badge{display:flex;align-items:center;gap:4px;padding:3px 9px;border-radius:4px;
  background:rgba(255,48,85,.12);border:1px solid rgba(255,48,85,.4);
  font-family:var(--ff);font-size:10px;letter-spacing:2px;color:#FF3055}
.live-badge::before{content:'';width:5px;height:5px;border-radius:50%;background:#FF3055;animation:blk 1.2s infinite}
.vsw{display:flex;gap:3px;margin-left:auto}
.vbtn{padding:4px 11px;border-radius:4px;border:1px solid rgba(255,255,255,.1);
  background:transparent;color:var(--ink2);font-family:var(--ff);font-size:11px;letter-spacing:1px;cursor:pointer;transition:.13s}
.vbtn.on{background:#2D9CFF;color:#fff;border-color:#2D9CFF}
.vbtn:hover:not(.on){background:rgba(255,255,255,.06)}
#clk{font-family:var(--fm);font-size:11px;color:var(--ink3);margin-left:6px}

/* Fullscreen : masquer topbar, shell plein écran */
:fullscreen .topbar,:-webkit-full-screen .topbar,:-moz-full-screen .topbar{display:none!important}
:fullscreen .shell,:-webkit-full-screen .shell,:-moz-full-screen .shell{
  height:100vh!important;grid-template-rows:auto 1fr!important
}

.shell{width:100%;height:calc(100vh - var(--tb));display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:auto 1fr;
  overflow:hidden}
/* Chrono — ligne 1, colonnes 1+2 */
.shared-chrono-col{
  grid-column:1/3;grid-row:1;
  display:flex;flex-direction:row;align-items:center;justify-content:center;gap:16px;
  background:rgba(4,7,13,.99);border-bottom:2px solid rgba(255,255,255,.08);
  padding:6px 24px;z-index:5;overflow:hidden;flex-shrink:0
}
.shared-chrono-col .chrono-band{
  display:flex;flex-direction:row;align-items:center;justify-content:center;gap:14px;
  background:none;border:none;padding:0
}
.shared-chrono-col .chrono-lbl{
  font-family:var(--ff);font-size:clamp(11px,1.2vw,18px);
  letter-spacing:4px;color:var(--ink3);white-space:nowrap
}
.shared-chrono-col .chrono-val{
  font-family:var(--fm);font-weight:900;
  font-size:clamp(42px,7vw,110px);letter-spacing:-3px;line-height:1;color:#fff;transition:color .3s
}
/* Zones — ligne 2, côte à côte, même hauteur */
#z2{grid-column:1;grid-row:2;min-height:0;overflow:hidden}
#z1{grid-column:2;grid-row:2;min-height:0;overflow:hidden}
.shell.solo #z2{grid-column:1/3;grid-row:2}
.shell.solo #z1{grid-column:1/3;grid-row:2}
.shell.solo .zone-col.hidden{display:none}
.shell.solo .shared-chrono-col{grid-column:1/3}
.zone-col{display:flex;flex-direction:column;min-height:0;overflow:hidden;position:relative}
.zone-col.hidden{display:none}
.zone-col:first-child{border-right:2px solid rgba(255,255,255,.07)}
.z-bar{height:4px;flex-shrink:0}
.z-bar.z1{background:linear-gradient(90deg,#2D9CFF 0%,transparent 100%)}
.z-bar.z2{background:linear-gradient(90deg,#00C87A 0%,transparent 100%)}

/* WOD header compact */
.wod-hdr{flex-shrink:0;padding:5px 14px 4px;background:rgba(10,15,24,.97);border-bottom:1px solid rgba(255,255,255,.06)}
.wod-meta{display:flex;align-items:center;gap:5px;margin-bottom:2px;flex-wrap:wrap}
.tag{padding:2px 8px;border-radius:3px;font-family:var(--ff);font-size:clamp(9px,0.9vw,13px);letter-spacing:2px}
.tag.z1{background:rgba(45,156,255,.15);border:1px solid rgba(45,156,255,.4);color:#2D9CFF}
.tag.z2{background:rgba(0,200,122,.12);border:1px solid rgba(0,200,122,.35);color:#00C87A}
.tag.ht{background:rgba(255,255,255,.06);color:var(--ink2)}
.tag.live{background:rgba(255,48,85,.12);border:1px solid rgba(255,48,85,.4);color:#FF3055;animation:sp 2s infinite}
.tag.timecap{background:rgba(255,176,32,.1);border:1px solid rgba(255,176,32,.35);color:var(--warn)}
.tag.pre{background:rgba(255,176,32,.1);border:1px solid rgba(255,176,32,.35);color:var(--warn)}
.tag.done,.tag.pending{background:rgba(255,255,255,.05);color:var(--ink3)}
.tag.ih{background:rgba(45,156,255,.1);border:1px solid rgba(45,156,255,.25);color:#2D9CFF;margin-left:auto}
.wod-title-row{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
.wod-nom{font-family:var(--ff);font-size:clamp(22px,3.5vw,58px);line-height:1;letter-spacing:2px;color:#fff;text-transform:uppercase}
.wod-cat{font-family:var(--fc);font-weight:700;font-size:clamp(11px,1.4vw,20px);letter-spacing:.8px;color:var(--ink2)}
.mov-row{display:flex;gap:3px;flex-wrap:nowrap;overflow:hidden;margin-top:2px}
.mov{display:inline-flex;align-items:baseline;gap:3px;padding:1px 7px;border-radius:3px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);white-space:nowrap}
.mov-q{font-family:var(--fm);font-size:clamp(10px,1.1vw,14px);font-weight:900;color:#fff}
.mov-n{font-family:var(--ff);font-size:clamp(10px,1.1vw,14px);letter-spacing:.4px;color:var(--ink2)}
.mov-p{font-size:clamp(8px,.8vw,10px);color:#9B5DE5;font-weight:700}

/* Zone body : chrono haut, équipes bas */
.zone-body{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden;background:rgba(7,9,15,.92)}
/* Chrono individuel par zone */
.zone-chrono{flex-shrink:0;padding:6px 16px 8px}
.zone-chrono .chrono-lbl{font-size:clamp(9px,1.1vw,16px);letter-spacing:4px}
.zone-chrono .chrono-val{font-size:clamp(48px,7.5vw,160px);letter-spacing:-2px}

/* Chrono — GRAND, sans cap restrictif */
.chrono-band{
  flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:6px 8px 4px;background:rgba(4,7,13,.99);
  border-bottom:2px solid rgba(255,255,255,.06);position:relative;overflow:hidden
}
.chrono-band::after{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 100% at 50% 50%,rgba(255,255,255,.04) 0%,transparent 70%);
  pointer-events:none;transition:background .4s}
.chrono-band.clr-run::after{background:radial-gradient(ellipse 80% 100% at 50% 50%,rgba(255,176,32,.08) 0%,transparent 70%)}
.chrono-band.clr-hot::after{background:radial-gradient(ellipse 80% 100% at 50% 50%,rgba(255,48,85,.10) 0%,transparent 70%)}
.chrono-band.clr-ok::after{background:radial-gradient(ellipse 80% 100% at 50% 50%,rgba(0,229,160,.08) 0%,transparent 70%)}
.chrono-band.clr-ih::after{background:radial-gradient(ellipse 80% 100% at 50% 50%,rgba(45,156,255,.08) 0%,transparent 70%)}
.chrono-lbl{font-family:var(--ff);font-size:clamp(11px,1.4vw,24px);letter-spacing:5px;color:var(--ink3);margin-bottom:0;position:relative;z-index:1}
/* ★ Grand écran : 17vw = ~163px/col sur 1920px, cap à 420px pour 4K+ */
.chrono-val{font-family:var(--fm);font-weight:900;font-size:clamp(80px,17vw,420px);
  letter-spacing:-6px;line-height:1;color:#fff;position:relative;z-index:1;transition:color .3s}
.chrono-val.run{color:#FFB020}
.chrono-val.hot{color:#FF3055;animation:hf 1s infinite}
.chrono-val.warn{color:var(--warn)}
.chrono-val.ih{color:#2D9CFF}
.chrono-val.coup{color:var(--warn)}
.chrono-val.fin{color:#00E5A0}
.chrono-val.idle{color:var(--ink3)}

/* Teams band */
.teams-band{flex:1;min-height:0;overflow-y:auto;padding:6px 10px 8px;display:flex;flex-direction:column;gap:4px}
.teams-band::-webkit-scrollbar{width:3px}
.teams-band::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:99px}

/* Preview prochain heat */
.preview-hdr{flex-shrink:0;padding:10px 16px;
  background:rgba(45,156,255,.09);border:1px solid rgba(45,156,255,.28);border-radius:8px;
  margin-bottom:4px;font-family:var(--ff);font-size:clamp(20px,2.8vw,42px);
  letter-spacing:3px;color:#2D9CFF;text-align:center;animation:sp 1.5s infinite}

/* Cartes équipes */
.tc{flex-shrink:0;padding:6px 12px;border-radius:8px;
  border:1px solid rgba(255,255,255,.07);background:rgba(12,18,30,.9);transition:border-color .3s,background .3s}
.tc.ok{border-color:rgba(0,229,160,.25);background:rgba(0,229,160,.05)}
.tm{display:flex;align-items:center;gap:12px}
.tcol{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.tmeta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:4px}
.rk{font-family:var(--ff);font-size:clamp(22px,3vw,52px);line-height:1;min-width:40px;text-align:center;color:var(--gold)}
.rk.r1{color:#FFD700}.rk.r2{color:#C0C0C0}.rk.r3{color:#CD7F32}
.tn{font-family:var(--ff);font-size:clamp(18px,2.8vw,46px);letter-spacing:.5px;color:#fff;
  flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tsc{font-family:var(--fm);font-size:clamp(14px,2.2vw,36px);font-weight:900;text-align:right;flex-shrink:0}
.tsc.lv{color:#FFB020}.tsc.vl{color:#00E5A0}.tsc.nd{color:var(--ink3)}
.crown{display:inline-block;font-size:clamp(20px,2.6vw,38px);margin-left:6px;animation:sp 2s infinite;vertical-align:middle}
.mini{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:4px;
  font-family:var(--fm);font-size:clamp(12px,1.4vw,20px);font-weight:700;
  border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);color:var(--ink2)}
.mini.gap{color:#FFB020;border-color:rgba(255,176,32,.22);background:rgba(255,176,32,.08)}
.mini.lead{color:#00E5A0;border-color:rgba(0,229,160,.22);background:rgba(0,229,160,.08)}
.mini.eta{color:#7FB8E0;border-color:rgba(77,166,255,.22);background:rgba(77,166,255,.08)}
.mini.eta.ok{color:#00E5A0;border-color:rgba(0,229,160,.22);background:rgba(0,229,160,.08)}
.mini.eta.warn{color:#FFB020;border-color:rgba(255,176,32,.22);background:rgba(255,176,32,.08)}
.mini.eta.err{color:#FF3055;border-color:rgba(255,48,85,.22);background:rgba(255,48,85,.08)}
.pbar{display:none}
.chips{display:flex;gap:3px;flex-wrap:wrap;margin-top:5px}
.chip{padding:3px 8px;border-radius:4px;font-size:clamp(10px,1.2vw,16px);font-family:var(--fm);font-weight:700;
  border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.03);color:var(--ink3);transition:all .2s}
.chip.d{background:rgba(0,229,160,.08);border-color:rgba(0,229,160,.25);color:#00E5A0}
.chip.a{background:rgba(255,176,32,.08);border-color:rgba(255,176,32,.25);color:#FFB020}
.fs-btn{white-space:nowrap}
.zone-idle{flex:1;min-height:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(7,9,15,.9)}
.idle-z{font-family:var(--ff);font-size:clamp(60px,10vw,160px);letter-spacing:8px;color:rgba(255,255,255,.04)}
.idle-lb{font-family:var(--ff);font-size:clamp(12px,1.5vw,22px);letter-spacing:4px;color:var(--ink3)}
.pod-overlay{display:none;position:absolute;inset:0;z-index:200;background:rgba(5,7,12,.97);
  overflow-y:auto;padding:22px;flex-direction:column;gap:10px;align-items:stretch}
.pod-overlay.on{display:flex}
#morning-cd{display:none;position:fixed;inset:0;z-index:300;
  background:rgba(5,7,12,.97);flex-direction:column;align-items:center;justify-content:center;gap:16px}
#morning-cd.on{display:flex}
.mcd-lbl{font-family:var(--ff);font-size:clamp(14px,2vw,26px);letter-spacing:6px;color:var(--ink2)}
.mcd-val{font-family:var(--fm);font-weight:900;font-size:clamp(80px,20vw,300px);
  letter-spacing:-4px;line-height:1;color:#fff;transition:color .3s}
.mcd-val.warn{color:#FFB020}.mcd-val.hot{color:#FF3055;animation:hf 1s infinite}.mcd-val.go{color:#00E5A0}
.mcd-sub{font-family:var(--ff);font-size:clamp(12px,1.5vw,20px);letter-spacing:3px;color:var(--ink3)}
.p-title{font-family:var(--ff);font-size:clamp(26px,5vw,70px);letter-spacing:4px;color:#fff;text-align:center}
.p-sub{font-family:var(--ff);font-size:clamp(13px,2vw,24px);letter-spacing:2px;color:var(--ink2);text-align:center;margin-bottom:5px}
.p-row{display:flex;align-items:center;gap:12px;padding:10px 16px;border-radius:5px;margin-bottom:5px;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08)}
.p-row.r1{background:rgba(255,215,0,.07);border-color:rgba(255,215,0,.3)}
.p-row.r2{background:rgba(192,192,192,.05);border-color:rgba(192,192,192,.18)}
.p-row.r3{background:rgba(205,127,50,.06);border-color:rgba(205,127,50,.22)}
.p-rk{font-family:var(--ff);font-size:clamp(28px,5vw,70px);min-width:60px;text-align:center}
.p-nm{font-family:var(--ff);font-size:clamp(24px,4vw,60px);letter-spacing:1px;color:#fff;flex:1}
.p-sc{font-family:var(--fm);font-size:clamp(18px,3.5vw,50px);font-weight:900;color:#00E5A0;text-align:right}
.p-pts{font-family:var(--fm);font-size:clamp(16px,2.5vw,36px);font-weight:900;color:var(--gold);min-width:65px;text-align:right}
.p-timer{font-family:var(--fm);font-size:13px;color:var(--ink3);text-align:center;margin-top:5px}
@keyframes blk{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes sp{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes hf{0%,100%{opacity:1}50%{opacity:.35}}

/* ── MOBILE : zones empilées verticalement ── */
@media (max-width:700px){
  .shell{grid-template-columns:1fr;grid-template-rows:auto 1fr 1fr}
  .shared-chrono-col{grid-column:1;grid-row:1}
  #z2{grid-column:1;grid-row:2}
  #z1{grid-column:1;grid-row:3}
  .zone-col:first-child{border-right:none;border-bottom:2px solid rgba(255,255,255,.07)}
  /* Chrono adapté à la largeur mobile */
  .chrono-val{font-size:clamp(56px,22vw,120px);letter-spacing:-3px}
  .chrono-lbl{font-size:clamp(10px,2.5vw,14px);letter-spacing:3px}
  /* Cartes équipes compactes */
  .tc{padding:7px 10px;border-radius:6px}
  .rk{font-size:clamp(22px,7vw,36px);min-width:34px}
  .tn{font-size:clamp(18px,5.5vw,32px)}
  .tsc{font-size:clamp(14px,4vw,24px)}
  .mini{font-size:clamp(9px,2.8vw,13px);padding:2px 5px}
  .tmeta{margin-top:2px;gap:4px}
  .teams-band{gap:4px;padding:6px 8px 8px}
  /* WOD header compact sur mobile */
  .wod-nom{font-size:clamp(16px,5.5vw,28px)}
  .wod-cat{font-size:clamp(10px,2.8vw,14px)}
  .tag{font-size:clamp(8px,2vw,11px);padding:2px 5px}
  .preview-hdr{font-size:clamp(13px,4vw,20px);padding:7px 10px}
  .chips{margin-top:3px}
  .chip{font-size:clamp(9px,2.5vw,12px);padding:2px 5px}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="brand-ico">K</div>
    <span class="brand-lbl">FOC 2026</span>
  </div>
  <div class="live-badge">LIVE</div>
  <div class="vsw">
    <button id="vb" class="vbtn on" onclick="setView('both')">Z1+Z2</button>
    <button id="v2" class="vbtn" onclick="setView('zone2')">← Z2</button>
    <button id="v1" class="vbtn" onclick="setView('zone1')">Z1 →</button>
    <button id="vfs" class="vbtn fs-btn" onclick="toggleFullscreen()">⛶ Grand écran</button>
  </div>
  <span id="clk">--:--:--</span>
</div>

<div class="shell" id="shell">
  <div id="shared-chrono" class="shared-chrono-col">
    <div class="chrono-band" id="cb-s">
      <div class="chrono-lbl" id="cl-s">⌛ EN ATTENTE</div>
      <div class="chrono-val idle" id="cv-s">--:--</div>
    </div>
  </div>
  <div class="zone-col" id="z2"></div>
  <div class="zone-col" id="z1"></div>
</div>

<div id="morning-cd">
  <div class="mcd-lbl">⏳ DÉBUT DE JOURNÉE</div>
  <div class="mcd-val" id="mcd-val">2:00</div>
  <div class="mcd-sub" id="mcd-sub">Préparation en cours…</div>
</div>

<script>
// ════ FIREBASE ════
var db=null;
try{
  if(typeof firebase==='undefined') throw new Error('SDK non chargé');
  if(!firebase.apps||!firebase.apps.length) firebase.initializeApp({databaseURL:FIREBASE_DB_URL});
  db=firebase.database();
}catch(e){ db=null; console.error('[LIVE] Firebase init failed',e); }
var _off=0;
if(db) db.ref('.info/serverTimeOffset').on('value',function(s){_off=s.val()||0;});
function now(){return Date.now()+_off;}

// ════ STATE ════
var HEATS={},SCORES={},IH={},CD={},ZSYNC={},VIEW='both';
var _iv={1:null,2:null},_ivKey={1:null,2:null};
var _dh={1:null,2:null},_ds={1:null,2:null};
var _hold={1:null,2:null};
var _lastFrame={1:null,2:null};
var _teamIv={1:null,2:null}; // interval pour mise à jour de la band équipes pendant IH
var ETA_MEM={};
var MEDALS=['🥇','🥈','🥉'];

// ════ UTILS ════
function p2(n){return n<10?'0'+n:String(n);}
function fmt(s){s=Math.max(0,Math.floor(s||0));return Math.floor(s/60)+':'+p2(s%60);}
function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):''}
function scoreStr(sc,w){
  if(!sc)return '0';
  var sf=(w.scoreFinale||w.scoreType||'').toLowerCase(),jm=(w.judgeMode||'').toLowerCase();
  var isT=(w.wodFormat||'').toLowerCase()==='fortime'||sf==='time';
  if(jm==='maxload'||sf==='load') return (sc.load||0)+' kg';
  if(sf==='dist') return (sc.dist||sc.distance||0)+' m';
  if(isT) return sc.finalTime>0?fmt(sc.finalTime):'CAP';
  return (sc.reps||0)+' reps';
}
function scoreVal(sc,w){
  if(!sc)return 0;
  var sf=(w.scoreFinale||w.scoreType||'').toLowerCase(),jm=(w.judgeMode||'').toLowerCase();
  var isT=(w.wodFormat||'').toLowerCase()==='fortime'||sf==='time';
  if(jm==='maxload'||sf==='load') return parseFloat(sc.load)||0;
  if(sf==='dist') return parseFloat(sc.dist||sc.distance)||0;
  if(isT) return sc.finalTime>0?-sc.finalTime:0;
  return parseInt(sc.reps)||0;
}
function getSc(hid,h,ln){
  var hS=(HEATS[hid]&&HEATS[hid].scores)||h.scores||{};
  var n=parseInt(String(hid).replace(/\D/g,''))||0;
  return hS[ln]||hS[String(ln)]||hS[parseInt(ln)]||SCORES[hid+'_'+ln]||SCORES[n+'_'+ln]||{};
}

// ════ HEAT ACTIF ════
function getHeat(zone){
  var zs=ZSYNC['z'+zone]||ZSYNC[String(zone)]||null;
  if(zs){
    var pref=[zs.currentHeatId,zs.displayHeatId,zs.selectedHeatId,zs.nextHeatId].filter(Boolean);
    for(var i=0;i<pref.length;i++){var ph=HEATS[pref[i]];if(ph&&(parseInt(ph.catZone!=null?ph.catZone:ph.zone)||1)===zone)return{id:pref[i],h:ph};}
  }
  var best=null,bp=99,bn=0;
  var P={live:0,pre:1,pending:2,timecap:3,done:9};
  Object.keys(HEATS).forEach(function(hid){
    var h=HEATS[hid];if(!h)return;
    if((parseInt(h.catZone!=null?h.catZone:h.zone)||1)!==zone)return;
    var p=P[h.status]!=null?P[h.status]:99,n=parseInt(String(hid).replace(/\D/g,''))||0;
    if(p<bp||(p===bp&&n>bn)){bp=p;bn=n;best=hid;}
  });
  return best?{id:best,h:HEATS[best]}:null;
}
function getNext(zone){
  var zs=ZSYNC['z'+zone]||null;
  if(zs&&zs.nextHeatId&&HEATS[zs.nextHeatId])return{id:zs.nextHeatId,h:HEATS[zs.nextHeatId]};
  var best=null,bn=0;
  Object.keys(HEATS).forEach(function(hid){
    var h=HEATS[hid];if(!h)return;
    if((parseInt(h.catZone!=null?h.catZone:h.zone)||1)!==zone)return;
    if(h.status!=='pending'&&h.status!=='pre')return;
    var n=parseInt(String(hid).replace(/\D/g,''))||0;
    if(n>bn){bn=n;best=hid;}
  });
  return best?{id:best,h:HEATS[best]}:null;
}

// ════ CAP — identique à tk9delta.wodCapSec ════
function wodCapSec(w){
  w=w||{};
  var sec=parseInt(w.duree||w.capSec||w.capSeconds||w.durationSec||0,10)||0;
  if(sec>0)return sec;
  var cm=parseInt(w.capMinutes||0,10)||0;
  if(cm>0)return cm*60;
  var wv=parseInt(w.workMin||0,10)||0;
  if(wv>0)return wv>300?wv:wv*60;
  return 0;
}

function getSharedClockState(){
  // Cherche la première zone active (Z1 en priorité, sinon Z2)
  var refZone=1;
  var cdZ1=CD['1'],cdZ2=CD['2'];
  var ihZ1=IH['1'],ihZ2=IH['2'];
  var dZ1=getHeat(1),dZ2=getHeat(2);
  // Si Z1 n'a rien d'actif mais Z2 oui → utiliser Z2 comme référence
  var z1Active=!!(cdZ1&&cdZ1.active&&cdZ1.target>now())
             ||(ihZ1&&ihZ1.active&&ihZ1.target>(now()-4000))
             ||(dZ1&&dZ1.h&&(dZ1.h.status==='live'||dZ1.h.status==='pre'));
  var z2Active=!!(cdZ2&&cdZ2.active&&cdZ2.target>now())
             ||(ihZ2&&ihZ2.active&&ihZ2.target>(now()-4000))
             ||(dZ2&&dZ2.h&&(dZ2.h.status==='live'||dZ2.h.status==='pre'));
  if(!z1Active&&z2Active) refZone=2;

  // 1. Countdown départ
  var cd=CD[String(refZone)]||(refZone===1?cdZ2:cdZ1);
  if(cd&&cd.active&&cd.target>now()){
    var rem=Math.max(0,Math.ceil((cd.target-now())/1000));
    return{val:rem>0?String(rem):'GO !',vcls:rem<=3?'hot':rem<=5?'warn':'run',lbl:'🔔 DÉPART',bcls:'clr-run'};
  }

  // 2. Inter-heat / coupure
  var ih=IH[String(refZone)]||(refZone===1?ihZ2:ihZ1);
  if(ih&&ih.active&&ih.target>(now()-4000)){
    var raw=Math.ceil((ih.target-now())/1000);
    var coup=(ih.ihType||'')==='coupure';
    if(raw>0) return{val:fmt(raw),vcls:coup?'coup':'ih',lbl:coup?'✂️ COUPURE':'⏳ INTER-HEAT',bcls:'clr-ih'};
    return{val:'GO !',vcls:'hot',lbl:'🚀 DÉPART',bcls:'clr-run'};
  }

  // 3. État du heat de la zone de référence
  var d=getHeat(refZone);
  if(!d) return{val:'--:--',vcls:'idle',lbl:'⌛ EN ATTENTE',bcls:''};
  var h=d.h,hid=d.id,w=h.wodInfo||{};
  var st=h.status||'pending';
  var ts=h.startTimestamp||(HEATS[hid]&&HEATS[hid].startTimestamp)||0;
  if(!ts){var zs=ZSYNC['z'+refZone]||null;if(zs&&zs.startTimestamp&&zs.displayHeatId===hid)ts=zs.startTimestamp;}

  if(st==='pre') return{val:'0:00',vcls:'warn',lbl:'🔔 PRÊT',bcls:''};

  if(st==='done'||st==='timecap'){
    var cap=wodCapSec(w);
    var elapsed=ts>0?Math.max(0,Math.floor((now()-ts)/1000)):cap||0;
    var displayVal=cap>0?fmt(cap):(ts>0?fmt(elapsed):'--:--');
    var isDone=st==='done';
    return{val:displayVal,vcls:isDone?'fin':'hot',lbl:isDone?'🏁 TERMINÉ':'🔴 TIMECAP',bcls:isDone?'clr-ok':''};
  }

  if(st==='live'){
    if(!ts) return{val:'--:--',vcls:'run',lbl:'⏳ SYNC',bcls:'clr-run'};
    var sf=(w.scoreFinale||w.scoreType||'').toLowerCase();
    var isT=(w.wodFormat||'').toLowerCase()==='fortime'||sf==='time';
    var cap=wodCapSec(w);
    var elapsed=Math.max(0,Math.floor((now()-ts)/1000));
    var rem=cap>0?Math.max(0,cap-elapsed):elapsed;
    var hot=cap>0&&(rem<=30);
    var warn=cap>0&&(rem<=60);
    return{val:fmt(rem),vcls:hot?'hot':warn?'warn':'run',lbl:'⏱ CHRONO',bcls:hot?'clr-hot':'clr-run'};
  }

  return{val:'--:--',vcls:'idle',lbl:'⌛ EN ATTENTE',bcls:''};
}

  if(!ts){

    if(zs&&zs.startTimestamp&&zs.displayHeatId===hid) ts=zs.startTimestamp;
  }
  if(!ts){
    // ── Heat live sans timestamp (race Firebase) : polling auto-guérison ──
    if(h.status==='live'){
      var k='wait-ts-'+hid;

      stopClock(z);_ivKey[z]=k;
      applyC(z,'--:--','run','⏳ SYNC','clr-run');

        _wAttempts++;
        var ts2=(HEATS[hid]&&HEATS[hid].startTimestamp)||0;

  if(_ivKey[z]===wantId){var _sf2=(w.scoreFinale||w.scoreType||"").toLowerCase();var _isT2=(w.wodFormat||"").toLowerCase()==="fortime"||_sf2==="time";var _cap2=wodCapSec(w);var _ts2=h.startTimestamp||(HEATS[hid]&&HEATS[hid].startTimestamp)||0;if(_ts2){var _e2=Math.max(0,Math.floor((now()-_ts2)/1000));var _r2=_cap2>0?Math.max(0,_cap2-_e2):_e2;applyC(z,fmt(_r2),(_cap2>0&&(_r2<=30))?"hot":(_cap2>0&&(_r2<=60))?"warn":"run",null,(_cap2>0&&(_r2<=30))?"clr-hot":"clr-run");}return;}stopClock(z);_ivKey[z]=wantId;
  var sf=(w.scoreFinale||w.scoreType||'').toLowerCase();
  var isT=(w.wodFormat||'').toLowerCase()==='fortime'||sf==='time';
  var cap=wodCapSec(w);

// ════ CLASSEMENT GÉNÉRAL ════
function getLeaders(){
  var pts={},p1={};
  Object.keys(HEATS).forEach(function(hid){
    var h=HEATS[hid];if(!h||!h.catId||!(h.status==='done'||h.status==='timecap'))return;
    var cid=String(h.catId),w=h.wodInfo||{};
    var sf=(w.scoreFinale||w.scoreType||'').toLowerCase();
    var isT=(w.wodFormat||'').toLowerCase()==='fortime'||sf==='time';
    var grp=[];
    Object.keys(h.slots||h.lanes||{}).forEach(function(ln){
      var l=(h.slots||h.lanes)[ln];if(!l||!l.teamName)return;
      var sc=getSc(hid,h,ln);
      if(!(sc.judgeOk===true||sc.judgeOk===1||sc.judgeOk==='true'))return;
      grp.push({t:l.teamName,v:isT?(sc.finalTime>0?-sc.finalTime:0):parseInt(sc.reps)||0});
    });
    grp.sort(function(a,b){return b.v-a.v;});var pp=1;
    grp.forEach(function(e,i){
      if(i>0&&e.v!==grp[i-1].v)pp=i+1;
      if(!pts[cid])pts[cid]={};pts[cid][e.t]=(pts[cid][e.t]||0)+pp;
      if(pp===1){if(!p1[cid])p1[cid]={};p1[cid][e.t]=(p1[cid][e.t]||0)+1;}
    });
  });
  var leaders={};
  Object.keys(pts).forEach(function(cid){
    var arr=Object.keys(pts[cid]).map(function(t){return{t:t,p:pts[cid][t],p1:p1[cid]&&p1[cid][t]||0};});
    arr.sort(function(a,b){return a.p!==b.p?a.p-b.p:b.p1-a.p1;});
    if(arr.length)leaders[cid]=arr[0].t;
  });
  return leaders;
}


function adaptedQtyForMove(m,catId){
  if(!m)return 0;
  if(catId&&m.qtyParCat&&m.qtyParCat[catId]!=null&&m.qtyParCat[catId]!=='') return parseInt(m.qtyParCat[catId],10)||0;
  return parseInt(m.qty||m.ergoTarget||0,10)||0;
}
function getMoveLoad(m,catId){
  if(!m)return 0;
  var raw='';
  if(catId&&m.poids&&typeof m.poids==='object') raw=m.poids[catId]||'';
  else if(typeof m.poids==='string'||typeof m.poids==='number') raw=m.poids;
  return parseFloat(String(raw).replace(',', '.'))||0;
}
function movementDifficulty(m,catId){
  if(!m)return 1;
  var name=String(m.nom||m.name||'').toLowerCase();
  var diff=1;
  [
    ['wall walk',0.16],['rope climb',0.18],['muscle up',0.20],['bar muscle',0.20],['ring muscle',0.22],
    ['handstand',0.17],['snatch',0.14],['clean',0.12],['thruster',0.14],['burpee',0.11],['devil press',0.18],
    ['box jump',0.08],['pistol',0.12],['toes to bar',0.11],['pull up',0.09],['double under',0.05],
    ['row',0.07],['ski',0.08],['bike',0.09],['run',0.06],['farmer',0.10],['lunge',0.08]
  ].forEach(function(pair){ if(name.indexOf(pair[0])!==-1) diff+=pair[1]; });
  var load=getMoveLoad(m,catId);
  if(load>=120)diff+=0.24; else if(load>=100)diff+=0.18; else if(load>=80)diff+=0.14; else if(load>=60)diff+=0.10; else if(load>=40)diff+=0.06;
  var qty=adaptedQtyForMove(m,catId);
  if(qty>=50)diff+=0.12; else if(qty>=35)diff+=0.08; else if(qty>=20)diff+=0.05; else if(qty>=10)diff+=0.02;
  return Math.min(2.2,Math.max(1,diff));
}
function progressInfoForWod(w,sc,catId){
  var moves=(w&&w.mouvements)||[];
  var idx=parseInt((sc&&sc.curMoveIdx)||0,10)||0;
  var moveReps=parseInt((sc&&sc.moveReps)||0,10)||0;
  var total=0, doneBefore=0, currentQty=0, currentMove=null;
  moves.forEach(function(m,mi){
    var q=adaptedQtyForMove(m,catId);
    total+=q;
    if(mi<idx) doneBefore+=q;
    if(mi===idx){currentQty=q;currentMove=m;}
  });
  var liveRepsVal=parseInt((sc&&sc.reps)||0,10)||0;
  var done=Math.max(liveRepsVal,doneBefore+moveReps);
  if(total>0) done=Math.min(done,total);
  return {total:total,done:done,idx:idx,moveReps:moveReps,currentQty:currentQty,currentMove:currentMove,moves:moves};
}
function getEtaTrackKey(row,h){

function updateEtaMemory(row,h,prog,elapsed){
  var sc=row&&row.sc||{};
  var lane=(row&&row.ln)||'';
  var hid=(h&&h._id)||'';
  var key=hid+'_'+lane;
  if(!ETA_MEM[key]) ETA_MEM[key]={samples:[],lastMoveIdx:null,lastReps:0,lastTs:0,transitionPenalty:0};
  var mem=ETA_MEM[key];
  var ts=parseInt(sc.ts||Date.now(),10)||Date.now();
  var reps=Math.max(0,prog.done||parseInt(sc.reps||0,10)||0);
  var idx=parseInt(prog.idx||0,10)||0;
  if(mem.lastMoveIdx!==null && idx!==mem.lastMoveIdx) mem.transitionPenalty=Math.min(12,(mem.transitionPenalty||0)+2.4);
  if(mem.lastTs && ts>mem.lastTs && reps<mem.lastReps){ mem.samples=[]; }
  if(!mem.samples.length || ts!==mem.lastTs || reps!==mem.lastReps || idx!==mem.lastMoveIdx){
    mem.samples.push({ts:ts,reps:reps,idx:idx,elapsed:elapsed});
    if(mem.samples.length>18) mem.samples=mem.samples.slice(-18);
    mem.lastTs=ts; mem.lastReps=reps; mem.lastMoveIdx=idx;
  }
  if(mem.transitionPenalty>0) mem.transitionPenalty=Math.max(0,mem.transitionPenalty-0.08);
  return mem;
}
function rateFromSamples(samples, seconds){
  if(!samples||samples.length<2) return 0;
  var last=samples[samples.length-1];
  for(var i=samples.length-2;i>=0;i--){
    var s=samples[i];
    var dt=(last.ts-s.ts)/1000;
    if(dt>=seconds){
      var dr=last.reps-s.reps;
      return dt>0&&dr>=0?dr/dt:0;
    }
  }
  var first=samples[0];
  var dt2=(last.ts-first.ts)/1000,dr2=last.reps-first.reps;
  return dt2>0&&dr2>=0?dr2/dt2:0;
}
function clamp(n,min,max){ return Math.max(min,Math.min(max,n)); }
function fmtDelta(s){ return '±'+fmt(Math.max(0,Math.round(s||0))); }

// ── Régression linéaire sur les échantillons (reps = a*elapsed + b) ──
// Retourne {rate, r2} : taux instantané et coefficient de détermination (qualité du fit)
function linReg(samples){
  var n=samples.length;
  if(n<2) return {rate:0,r2:0};
  var sx=0,sy=0,sxy=0,sxx=0,syy=0;
  for(var i=0;i<n;i++){
    var x=samples[i].elapsed, y=samples[i].reps;
    sx+=x; sy+=y; sxy+=x*y; sxx+=x*x; syy+=y*y;
  }
  var denom=n*sxx-sx*sx;
  if(Math.abs(denom)<0.001) return {rate:0,r2:0};
  var a=(n*sxy-sx*sy)/denom; // pente = reps/sec
  // R² pour mesurer la qualité du fit
  var yMean=sy/n, ssTot=0, ssRes=0, b=(sy-a*sx)/n;
  for(var i=0;i<n;i++){
    var yHat=a*samples[i].elapsed+b;
    ssRes+=Math.pow(samples[i].reps-yHat,2);
    ssTot+=Math.pow(samples[i].reps-yMean,2);
  }
  var r2=ssTot>0?Math.max(0,1-ssRes/ssTot):0;
  return {rate:Math.max(0,a), r2:r2};
}

// ── Modèle de fatigue exponentielle ──
// k = coefficient de décroissance (CrossFit typique : 0.3-0.6 selon difficulté)
// rate_t = rate_0 * exp(-k * t/cap)
function fatigueAdjust(baseRate, elapsed, cap, diff, pctDone){
  if(cap<=0||baseRate<=0) return baseRate;
  // k augmente avec la difficulté du mouvement
  var k=clamp(0.20 + (diff-1)*0.25, 0.15, 0.65);
  // Correction : on est à elapsed/cap dans le WOD
  var tNorm=clamp(elapsed/cap, 0, 1);
  // Taux moyen restant en tenant compte de la décroissance exponentielle
  var tRem=clamp(1-tNorm, 0.01, 1);
  // Intégrale de exp(-k*t) sur [tNorm,1] / tRem
  var integral=(Math.exp(-k*tNorm)-Math.exp(-k))/(k*tRem);
  // Normaliser par le taux au point actuel pour obtenir le taux moyen futur
  var rateAtNow=baseRate*Math.exp(-k*tNorm);
  var rateMeanFuture=rateAtNow>0?rateAtNow*integral:baseRate*integral;
  return Math.max(0, rateMeanFuture);
}

function etaInfoForRow(row,w,h,catId){
  var sc=row&&row.sc||{};
  if(!h||h.status!=='live'||!h.startTimestamp||sc.judgeOk) return null;
  var fmtName=String((w.wodFormat||w.type||'').toLowerCase());
  var sf=String((w.scoreFinale||w.scoreType||'').toLowerCase());
  var jm=String((w.judgeMode||'').toLowerCase());
  var isFortime=fmtName==='fortime'||sf==='time'||(w.scoreFields&&w.scoreFields.indexOf&&w.scoreFields.indexOf('time')>=0)||(w.type&&w.type.toLowerCase()==='fortime');
  var isMaxload=fmtName==='maxload'||jm==='maxload'||sf==='load';
  var isErgo=fmtName==='ergo'||jm==='ergo'||sf==='dist';
  var isEMOM=fmtName==='emom';
  var isInterval=fmtName==='interval'||fmtName==='intervals';
  var isRounds=fmtName==='rounds'||(fmtName===''&&parseInt(w.rounds||1)>1);
  if(isMaxload) return {text:'LOAD LIVE',cls:'eta'};

  var elapsed=Math.max(1,Math.floor((now()-h.startTimestamp)/1000));
  var prog=progressInfoForWod(w,sc,catId);
  var doneUnits=Math.max(0,prog.done||0);
  var totalUnits=Math.max(0,prog.total||0);
  var cap=wodCapSec(w);
  var mem=updateEtaMemory(row,h,prog,elapsed);
  var diff=movementDifficulty(prog.currentMove,catId);
  var pctDone=totalUnits>0?doneUnits/totalUnits:0;

  // ── Détection stall ──
  var stallSec=0;
  if(mem.samples.length>=2){
    var ls=mem.samples[mem.samples.length-1],prev=mem.samples[mem.samples.length-2];
    if(ls.reps===prev.reps) stallSec=Math.max(0,(ls.ts-prev.ts)/1000);
  }

  // ── Régression linéaire (taux global) ──
  var reg=linReg(mem.samples);
  var rateReg=reg.rate;   // reps/sec selon régression
  var r2=reg.r2;          // qualité du fit [0-1]

  // ── Taux fenêtres courtes (réactivité aux changements) ──
  var rateShort=rateFromSamples(mem.samples,8);
  var rateMid=rateFromSamples(mem.samples,18);
  var rateLong=doneUnits>0?doneUnits/elapsed:0;

  // ── Fusion : régression si bon fit, sinon fenêtres ──
  var baseRate;
  if(r2>=0.85&&mem.samples.length>=5){
    // Bonne régression → lui faire confiance à 70%, court à 30%
    baseRate=rateReg*0.70 + rateShort*0.30;
  } else if(r2>=0.60&&mem.samples.length>=3){
    // Régression moyenne → pondération équilibrée
    baseRate=rateReg*0.40 + rateShort*0.35 + rateMid*0.25;
  } else {
    // Peu de données → fenêtres classiques
    baseRate=rateShort*0.55 + rateMid*0.30 + rateLong*0.15;
  }
  if(baseRate<=0&&parseInt(sc.reps||0,10)>0) baseRate=parseInt(sc.reps||0,10)/elapsed;

  // ── Facteur transition entre mouvements ──
  var transitionFactor=1+Math.min(0.18,(mem.transitionPenalty||0)/10);

  // ── Taux ajusté avec fatigue exponentielle ──
  var adjRate=baseRate>0?fatigueAdjust(baseRate/transitionFactor,elapsed,cap,diff,pctDone):0;
  // Stall : réduire le taux proportionnellement
  if(stallSec>=4) adjRate*=Math.max(0.3,1-stallSec/30);

  // ── Confiance & spread ──
  // R² améliore la confiance si bon fit
  var confBase=mem.samples.length>=8?0.90:mem.samples.length>=5?0.80:mem.samples.length>=3?0.68:0.50;
  var confR2Bonus=r2>=0.85?0.06:r2>=0.60?0.03:0;
  var variance=Math.abs(rateShort-rateMid)/Math.max(0.001,(rateMid||rateShort||1));
  var confidence=clamp(confBase+confR2Bonus - Math.min(0.25,variance*0.30) - (stallSec>=4?0.12:0), 0.30, 0.94);
  var spreadSec=clamp((1-confidence)*45 + diff*5 + Math.max(0,stallSec*1.2), 4, 60);

  // ── ForTime ──
  if(isFortime){
    if(totalUnits<=0) return null;
    if(doneUnits<=0||adjRate<=0){
      if(cap>0) return {text:'CAP '+fmt(cap),cls:'eta'};
      return null;
    }
    var remain=Math.max(0,totalUnits-doneUnits);
    var etaSec=elapsed+Math.round(remain/adjRate);
    if(cap>0){
      var margin=cap-etaSec;
      var cls=margin>=20?'eta ok':margin>=0?'eta warn':'eta err';
      var text=margin>=0?'FIN ~'+fmt(etaSec):'TC +'+fmt(Math.abs(margin))+' retard';
      return {text:text,cls:cls};
    }
    return {text:'ETA '+fmt(etaSec)+' '+fmtDelta(spreadSec),cls:'eta'};
  }

  // ── Ergo ──
  if(isErgo){
    var dist=parseFloat(sc.dist||sc.distance||sc.ergoVal||sc.reps||0)||0;
    if(elapsed<4||dist<=0) return null;
    var ergoRate=dist/elapsed;
    var adjErgo=fatigueAdjust(ergoRate,elapsed,cap,diff,0);
    var proj=cap>0?Math.round(dist+adjErgo*Math.max(0,cap-elapsed)):Math.round(dist);
    var err=Math.max(3,Math.round((1-confidence)*proj*0.06));
    return {text:'PROJ '+proj+(w.scoreFinaleUnit||' m')+' ±'+err,cls:(cap>0&&elapsed/cap>0.8)?'eta warn':'eta'};
  }

  // ── AMRAP / Rounds ──
  if(cap>0&&elapsed>=4){
    if(doneUnits<=0&&adjRate<=0) return {text:'CAP '+fmt(cap),cls:'eta'};
    var timeLeft=Math.max(0,cap-elapsed);
    var proj2=Math.round(doneUnits + timeLeft*adjRate);
    if(proj2<=0) return null;
    var err2=Math.max(2,Math.round((1-confidence)*Math.max(8,proj2*0.07)));
    var pct=totalUnits>0?Math.round((proj2/totalUnits)*100):0;
    var cls2=pct>=100?'eta ok':pct>=80?'eta warn':'eta';
    return {text:'~'+proj2+' reps',cls:cls2};
  }
  if(doneUnits>0&&baseRate>0){
    return {text:(baseRate*60).toFixed(1)+'/min',cls:'eta'};
  }
  return null;
}

function compareScores(a,b,w){
  if(a.ok&&!b.ok)return -1;
  if(!a.ok&&b.ok)return 1;
  var av=scoreVal(a.sc,w),bv=scoreVal(b.sc,w);
  return bv-av;
}
function rankHeatEntries(hid,h,w){
  var lanes=h.slots||h.lanes||{},rows=[];
  Object.keys(lanes).forEach(function(ln){
    var l=lanes[ln];
    var team=l&&(l.teamName||l.team);
    if(!team)return;
    var sc=getSc(hid,h,ln)||{};
    rows.push({ln:ln,team:team,sc:sc,ok:!!sc.judgeOk});
  });
  rows.sort(function(a,b){return compareScores(a,b,w);});
  return rows;
}
function rankWodEntries(zone,h,w){
  var catId=String(h.catId||''),wodName=String((w&&w.nom)||'');
  var rows=[];
  Object.keys(HEATS).forEach(function(hid){
    var hx=HEATS[hid];
    if(!hx)return;
    if((parseInt(hx.catZone!=null?hx.catZone:hx.zone)||1)!==zone)return;
    if(String(hx.catId||'')!==catId)return;
    var wx=hx.wodInfo||{};
    if(String(wx.nom||'')!==wodName)return;
    var lanes=hx.slots||hx.lanes||{};
    Object.keys(lanes).forEach(function(ln){
      var l=lanes[ln];
      var team=l&&(l.teamName||l.team);
      if(!team)return;
      var sc=getSc(hid,hx,ln)||{};
      rows.push({ln:ln,team:team,sc:sc,ok:!!sc.judgeOk});
    });
  });
  rows.sort(function(a,b){return compareScores(a,b,w);});
  return rows;
}
function liveReps(sc){return parseInt((sc&&sc.reps)||0,10)||0;}
function gapText(row,lead,w,st){
  if(!lead||!row)return '';
  if(row===lead)return 'LEADER';
  var sf=(w.scoreFinale||w.scoreType||'').toLowerCase();
  var jm=(w.judgeMode||'').toLowerCase();
  var isT=(w.wodFormat||'').toLowerCase()==='fortime'||sf==='time';
  if(st==='live' || !row.ok || !lead.ok){
    var dr=Math.max(0,liveReps(lead.sc)-liveReps(row.sc));
    return dr>0?'- '+dr+' reps':'ÉGALITÉ';
  }
  if(jm==='maxload'||sf==='load'){
    var dl=(parseFloat((lead.sc&&lead.sc.load)||0)-parseFloat((row.sc&&row.sc.load)||0));
    return dl>0?'- '+dl+' kg':'ÉGALITÉ';
  }
  if(sf==='dist'){
    var dd=(parseFloat((lead.sc&&(lead.sc.dist||lead.sc.distance))||0)-parseFloat((row.sc&&(row.sc.dist||row.sc.distance))||0));
    return dd>0?'- '+dd+' m':'ÉGALITÉ';
  }
  if(isT){
    var lt=parseInt((lead.sc&&lead.sc.finalTime)||0,10)||0;
    var rt=parseInt((row.sc&&row.sc.finalTime)||0,10)||0;
    if(lt>0&&rt>0&&rt>=lt)return '+ '+fmt(rt-lt);
    var dr2=Math.max(0,liveReps(lead.sc)-liveReps(row.sc));
    return dr2>0?'- '+dr2+' reps':'ÉGALITÉ';
  }
  var dr3=Math.max(0,liveReps(lead.sc)-liveReps(row.sc));
  return dr3>0?'- '+dr3+' reps':'ÉGALITÉ';
}
function renderRankCards(rows,w,st,showLiveChips,h,catId,catLeader){
  if(!rows.length)return '<div style="display:flex;align-items:center;justify-content:center;flex:1;font-family:var(--ff);font-size:clamp(18px,2.5vw,32px);letter-spacing:2px;color:var(--ink3)">AUCUN CLASSEMENT</div>';
  var lead=rows[0]||null;
  return rows.map(function(e,i){
    var sc=e.sc||{},val=!!e.ok;
    // Affichage aligné avec le juge : moveReps / quota + mouvement + tour
    var _cr=parseInt(sc.moveReps)||0;
    var _ci=parseInt(sc.curMoveIdx)||0;
    var _cRound=parseInt(sc.currentRound)||1;
    var _movs=w.mouvements||[];
    var _curMov=_movs[_ci]||null;
    var _movName=_curMov?(_curMov.nom||''):''
;    var _q=_curMov?(adaptedQtyForMove(_curMov,catId)||parseInt(_curMov.qty)||0):0;
    var _tot=liveReps(sc);
    var _fmt=(w.wodFormat||'').toLowerCase();
    var _totalRounds=parseInt(w.rounds)||1;
    var _isRounds=_fmt==='rounds'&&_totalRounds>1;
    var _liveScore=!val&&st==='live'
      ?(_cr>0?String(_cr)+(_q>0?' / '+_q:''):(_tot>0?String(_tot):'—'))
      :'';
    var _subLine='';
    if(!val&&st==='live'){
      if(_movName) _subLine+=_movName;
      if(_isRounds) _subLine+=(_subLine?' - ':'')+' Tour '+_cRound+'/'+_totalRounds;
    }
    var _movHtml=_subLine
      ?'<div style="font-size:.42em;opacity:.45;font-family:var(--fc);letter-spacing:.5px;margin-top:1px">'+_subLine+'</div>'
      :'';
    var s=val?scoreStr(sc,w):(_tot>0?String(_tot)+' reps':'—');
    var repLead=liveReps(lead.sc),repMe=liveReps(sc);
    // Badge gap : LEADER pour le 1er, écart pour les autres
    var repDiff=repLead-repMe;
    var repGap='',gapCls='lead';
    if(i===0){
      repGap='LEADER'; gapCls='lead';
    } else {
      // Calculer le delta avec scoreVal (scores validés ou live)
      var leadVal = lead.ok ? scoreVal(lead.sc,w) : repLead;
      var meVal   = e.ok   ? scoreVal(e.sc,w)    : repMe;
      var isFortime=(w.wodFormat||'').toLowerCase()==='fortime'||(w.scoreFinale||w.scoreType||'').toLowerCase()==='time';
      var isLoad  =(w.judgeMode||'').toLowerCase()==='maxload'||(w.scoreFinale||w.scoreType||'').toLowerCase()==='load';
      var isErgo  =(w.scoreFinale||w.scoreType||'').toLowerCase()==='dist';
      if(isFortime){
        // ForTime : valeur négative (plus petit = plus rapide) — delta = moi - leader (positif = plus lent)
        var tDiff = meVal - leadVal; // si meVal plus négatif = plus rapide = devant
        if(leadVal===0&&meVal===0){ repGap=''; }
        else if(tDiff===0){ repGap='='; gapCls='lead'; }
        else if(tDiff<0){ repGap='+'+fmt(Math.abs(tDiff))+' av.'; gapCls='lead'; }
        else { repGap='+ '+fmt(tDiff); gapCls='gap'; }
      } else if(isLoad){
        var lDiff=leadVal-meVal;
        if(lDiff<=0){ repGap=leadVal>0?'=':''; gapCls='lead'; }
        else { repGap='- '+lDiff+' kg'; gapCls='gap'; }
      } else if(isErgo){
        var eDiff=leadVal-meVal;
        if(eDiff<=0){ repGap=leadVal>0?'=':''; gapCls='lead'; }
        else { repGap='- '+Math.round(eDiff)+' m'; gapCls='gap'; }
      } else {
        // AMRAP / reps
        var rDiff=leadVal-meVal;
        if(rDiff<=0){ repGap=leadVal>0?'=':''; gapCls='lead'; }
        else { repGap='- '+rDiff+' rep'+(rDiff>1?'s':''); gapCls='gap'; }
      }
    }
    var eta=etaInfoForRow(e,w,h,catId);
    var ci=parseInt(sc.curMoveIdx)||0,cr=parseInt(sc.moveReps)||0;
    var chipsHtml='';
    if(showLiveChips&&st==='live'&&!val&&(w.mouvements||[]).length){
      chipsHtml='<div class="chips">'+(w.mouvements||[]).map(function(m,mi){
        var q=adaptedQtyForMove(m,catId);
        var cl='chip',lb=esc(m.nom||'')+(q?' ×'+q:'');
        if(mi<ci){cl+=' d';lb='✓ '+lb;}else if(mi===ci){cl+=' a';lb='▶ '+lb+(q>0?' ('+(cr||0)+'/'+q+')':'');}
        return '<span class="'+cl+'">'+lb+'</span>';
      }).join('')+'</div>';
    }
    var isCatLeader=catLeader&&e.team&&e.team===catLeader;
    // ── Carte public : propre et lisible ──
    // LIGNE 1 : rang | nom d'équipe          | score (reps en cours) à droite
    // LIGNE 2 :       | badge gap/leader+ETA  |
    // LIGNE 3 :       | chips mouvements       |
    var gapBadge='';
    if(i===0){ gapBadge='<span class="mini lead">LEADER</span>'; }
    else if(repGap&&gapCls==='gap'){ gapBadge='<span class="mini gap">'+repGap+'</span>'; }
    var etaBadge=eta?'<span class="mini '+eta.cls+'">'+esc(eta.text)+'</span>':'';
    return '<div class="tc'+(val?' ok':'')+'">'  
      +'<div class="tm">'  
        +'<div class="rk'+(i<3?' r'+(i+1):'')+'">'+(MEDALS[i]||String(i+1))+'</div>'  
        +'<div class="tcol">'  
          +'<div class="tn">'+esc(e.team)+(isCatLeader?'<span class="crown">&#x1F451;</span>':'')+'</div>'  
          +((gapBadge||etaBadge)?'<div class="tmeta">'+gapBadge+etaBadge+'</div>':'')
        +'</div>'  
        +'<div style="flex-shrink:0;text-align:right;min-width:80px">'  
          +'<div class="tsc '+(val?'vl':st==='live'?'lv':'nd')+'">'+(s||'&mdash;')+'</div>'  
          +(i>0&&repGap&&gapCls==='gap'?'<div style="font-size:.55em;color:rgba(255,176,32,.8);font-family:var(--fm);text-align:right;font-weight:900;margin-top:2px">'+repGap+'</div>':'')
        +'</div>'  
      +'</div>'  
      +chipsHtml  
      +'</div>';
  }).join('');
}

        +'<div class="chrono-val idle" id="cv-z'+zone+'">--:--</div>'
      +'</div>'
      +'<div class="teams-band" id="tband-'+zone+'">'
        +renderRankCards(heatRows,dw,displaySt,displaySt==='live'||displaySt==='pre',dhFull,displayCatId,displayCatLeader)
      +'</div>'
    +'</div>';

  startClock(zone,hid,h,w);

  if(ihOn&&ih.target>now()){
    startTeamBandIH(zone,ih.target,dhid,dh,dw,displayCatId,displayCatLeader);
  }
}

// ════ TEAMS BAND IH PREVIEW ════
function clearTeamIv(z){clearInterval(_teamIv[z]);_teamIv[z]=null;}

function startTeamBandIH(zone,ihTarget,doneHid,doneH,doneW,catId,catLeader){
  clearTeamIv(zone);
  var _previewRendered=false;
  _teamIv[zone]=setInterval(function(){
    var el=document.getElementById('tband-'+zone);
    if(!el){clearTeamIv(zone);return;}
    var rem=Math.max(0,Math.ceil((ihTarget-now())/1000));
    if(rem<=0){clearTeamIv(zone);scheduleRender();return;}

    if(rem<=30){
      // ─ Preview prochain heat, countdown mis à jour chaque tick ─
      var nd=getNext(zone);
      if(!nd){
        if(!_previewRendered){
          _previewRendered=true;
          el.innerHTML='<div style="font-family:var(--ff);font-size:clamp(20px,3vw,40px);letter-spacing:2px;color:var(--ink3);text-align:center;padding:20px">AUCUN HEAT SUIVANT</div>';
        }
        return;
      }
      var slots=nd.h.slots||nd.h.lanes||{};
      var teams=Object.keys(slots).sort(function(a,b){return parseInt(a)-parseInt(b);}).map(function(ln){return slots[ln];}).filter(function(l){return l&&l.teamName;});
      // Toujours réécrire pour mettre à jour le countdown
      el.innerHTML='<div class="preview-hdr">⚡ PROCHAIN HEAT  '
        +p2(Math.floor(rem/60))+':'+p2(rem%60)+'</div>'
        +teams.map(function(l,i){
          return '<div class="tc" style="border-color:rgba(45,156,255,.18);background:rgba(45,156,255,.05)">'
            +'<div class="tm">'
              +'<div class="rk" style="color:var(--blue)">'+(i+1)+'</div>'
              +'<div class="tn">'+esc(l.teamName)+'</div>'
            +'</div>'
            +'</div>';
        }).join('');
    } else {
      // ─ Résultats du heat terminé, refresh si score mis à jour ─
      _previewRendered=false;
      var heatRows=rankHeatEntries(doneHid,doneH,doneW);
      el.innerHTML=renderRankCards(heatRows,doneW,doneH.status||'done',false,doneH,catId,catLeader);
    }
  },500);
}

function renderAll(){
  [1,2].forEach(function(z){
    var c=document.getElementById('z'+z);if(!c)return;
    var show=VIEW==='both'||VIEW==='zone'+z;
    c.classList.toggle('hidden',!show);
    if(show)renderZone(z);
  });
  var g=document.getElementById('shell');
  if(g)g.className='shell'+(VIEW!=='both'?' solo':'');
}
function setView(v){
  VIEW=v;
  document.querySelectorAll('.vbtn').forEach(function(b){if(b.id!=='vfs')b.classList.toggle('on',b.id==='v'+(v==='both'?'b':v.replace('zone','')));});
  _dh[1]=null;_dh[2]=null;renderAll();
}
function syncFsBtn(){
  var b=document.getElementById('vfs');
  if(!b)return;
  var on=!!(document.fullscreenElement||document.webkitFullscreenElement||document.mozFullScreenElement);
  b.classList.toggle('on',on);
  b.textContent=on?'✕ Quitter':'⛶ Grand écran';
}
function toggleFullscreen(){
  var el=document.documentElement;
  var isFs=document.fullscreenElement||document.webkitFullscreenElement||document.mozFullScreenElement;
  if(isFs){
    (document.exitFullscreen||document.webkitExitFullscreen||document.mozCancelFullScreen||function(){}).call(document);
  } else {
    (el.requestFullscreen||el.webkitRequestFullscreen||el.mozRequestFullScreen||function(){}).call(el);
  }
}
['fullscreenchange','webkitfullscreenchange','mozfullscreenchange'].forEach(function(evt){document.addEventListener(evt,syncFsBtn);});

// ════ PODIUM ════
var _podIv={};
var _podiumShown={};  // garde par hid : empêche le re-déclenchement sur update de score

function getPodEl(zone){
  var zc=document.getElementById('z'+zone);
  if(!zc)return{ov:null,ct:null,ti:null};
  var id='pod-z'+zone;
  var ov=document.getElementById(id);
  if(!ov){
    ov=document.createElement('div');ov.id=id;ov.className='pod-overlay';
    var ct=document.createElement('div');ct.id='pod-content-z'+zone;
    var ti=document.createElement('div');ti.className='p-timer';ti.id='pod-timer-z'+zone;
    ov.appendChild(ct);ov.appendChild(ti);zc.appendChild(ov);
  }
  return{ov:ov,ct:document.getElementById('pod-content-z'+zone),ti:document.getElementById('pod-timer-z'+zone)};
}

function showPodium(zone,hid,h,dur){
  if(_podiumShown[hid])return;
  _podiumShown[hid]=true;
  var p=getPodEl(zone),ov=p.ov,ct=p.ct,ti=p.ti;
  if(!ov||!ct)return;
  var w=h.wodInfo||{},sf=(w.scoreFinale||w.scoreType||'').toLowerCase();
  var isT=(w.wodFormat||'').toLowerCase()==='fortime'||sf==='time';
  var isLast=h.catHeatNum&&h.nbHeatsTotal&&parseInt(h.catHeatNum)>=parseInt(h.nbHeatsTotal);
  var lanes=h.slots||h.lanes||{},entries=[];
  Object.keys(lanes).forEach(function(ln){var l=lanes[ln];if(!l||!l.teamName)return;var sc=getSc(hid,h,ln);entries.push({t:l.teamName,sc:sc,v:scoreVal(sc,w)});});
  entries.sort(function(a,b){if(a.sc.judgeOk&&!b.sc.judgeOk)return -1;if(!a.sc.judgeOk&&b.sc.judgeOk)return 1;return isT?a.v-b.v:b.v-a.v;});

  // ── Phase 1 : résultat HEAT ──
  var heatHtml='<div class="p-title">🏁 '+esc(w.nom||'WOD')+'</div>'
    +'<div class="p-sub">'+esc(h.catName||'')+' · Heat '+(h.catHeatNum||'—')+'</div>';
  entries.forEach(function(e,i){heatHtml+='<div class="p-row'+(i<3?' r'+(i+1):'')+'"><div class="p-rk">'+(MEDALS[i]||i+1)+'</div><div class="p-nm">'+esc(e.t)+'</div><div class="p-sc">'+(e.sc.judgeOk?scoreStr(e.sc,w):'—')+'</div></div>';});

  var heatDur=Math.min(dur,isLast?20:dur); // phase heat : tout le temps si pas dernier, 20s si dernier
  ct.innerHTML=heatHtml;
  ov.className='pod-overlay on';ov._localPod=true;
  clearInterval(_podIv[zone]); _podIv[zone]=null;

  // Si dernier heat → enchaîner avec WOD après heatDur secondes
  if(isLast){
    var end1=Date.now()+heatDur*1000;
    _podIv[zone]=setInterval(function(){
      var rem=Math.max(0,Math.ceil((end1-Date.now())/1000));
      if(ti)ti.textContent='Classement WOD dans '+rem+'s';
      if(rem<=0){
        clearInterval(_podIv[zone]); _podIv[zone]=null;
        // ── Phase 2 : classement WOD ──
        var catId=String(h.catId||'');
        var catH=Object.keys(HEATS).filter(function(k){var hh=HEATS[k];return hh&&String(hh.catId)===catId&&(hh.status==='done'||hh.status==='timecap');});
        var tpts={},tp1={};
        catH.forEach(function(k){
          var hh=HEATS[k],ww=hh.wodInfo||{},sf2=(ww.scoreFinale||ww.scoreType||'').toLowerCase();
          var isT2=(ww.wodFormat||'').toLowerCase()==='fortime'||sf2==='time';
          var grp=[];
          Object.keys(hh.slots||hh.lanes||{}).forEach(function(ln){var l=(hh.slots||hh.lanes)[ln];if(!l||!l.teamName)return;var sc=getSc(k,hh,ln);if(!(sc.judgeOk===true||sc.judgeOk===1))return;grp.push({t:l.teamName,v:isT2?(sc.finalTime>0?-sc.finalTime:0):parseInt(sc.reps)||0});});
          grp.sort(function(a,b){return b.v-a.v;});var pp=1;
          grp.forEach(function(e,i){if(i>0&&e.v!==grp[i-1].v)pp=i+1;tpts[e.t]=(tpts[e.t]||0)+pp;if(pp===1){if(!tp1[e.t])tp1[e.t]=0;tp1[e.t]++;}});
        });
        var gen=Object.keys(tpts).map(function(t){return{t:t,p:tpts[t],p1:tp1[t]||0};});
        gen.sort(function(a,b){return a.p!==b.p?a.p-b.p:b.p1-a.p1;});
        var wodHtml='<div class="p-title">🏆 CLASSEMENT WOD</div><div class="p-sub">'+esc(h.catName||'')+'</div>';
        gen.forEach(function(t,i){wodHtml+='<div class="p-row'+(i<3?' r'+(i+1):'')+'"><div class="p-rk">'+(MEDALS[i]||i+1)+'</div><div class="p-nm">'+esc(t.t)+'</div><div class="p-pts">'+t.p+' pts</div></div>';});
        ct.innerHTML=wodHtml;
        var end2=Date.now()+30000;
        _podIv[zone]=setInterval(function(){var rem2=Math.max(0,Math.ceil((end2-Date.now())/1000));if(ti)ti.textContent='Fermeture dans '+rem2+'s';if(rem2<=0){clearInterval(_podIv[zone]);_podIv[zone]=null;ov._localPod=false;ov.className='pod-overlay';}},500);
      }
    },500);
  } else {
    // Pas dernier heat : afficher résultat heat pendant dur secondes
    var end=Date.now()+dur*1000;
    _podIv[zone]=setInterval(function(){var rem=Math.max(0,Math.ceil((end-Date.now())/1000));if(ti)ti.textContent='Fermeture dans '+rem+'s';if(rem<=0){clearInterval(_podIv[zone]);_podIv[zone]=null;ov._localPod=false;ov.className='pod-overlay';}},500);
  }
}
function showTKPodiumSlide(slide,idx,total,step){
  [1,2].forEach(function(zone){
    var zc=document.getElementById('z'+zone);if(!zc||zc.classList.contains('hidden'))return;
    var p=getPodEl(zone),ov=p.ov,ct=p.ct,ti=p.ti;
    if(!ov||!ct)return;ov._localPod=false;clearInterval(_podIv[zone]);_podIv[zone]=null;
    var STEPS=['🥉 3e place','🥈 2e place','🥇 Champion !'];
    var html='<div class="p-title">'+(MEDALS[step]||'🏆')+' '+esc(slide.cat||'')+'</div><div class="p-sub">'+(STEPS[step]||'')+'</div>';
    var teams=slide.teams||[];
    for(var i=step;i>=0;i--){var t=teams[i];if(!t)continue;html+='<div class="p-row r'+Math.min(i+1,3)+'"><div class="p-rk">'+(MEDALS[i]||(i+1))+'</div><div class="p-nm">'+esc(t.team||'')+'</div><div class="p-sc">'+esc(t.score||'')+'</div></div>';}
    ct.innerHTML=html;if(ti)ti.textContent='Slide '+(idx+1)+'/'+total+' · '+(STEPS[step]||'');ov.className='pod-overlay on';
  });
}

// ════ RENDER SCHEDULÉ ════
var _rd=null;function scheduleRender(){clearTimeout(_rd);_rd=setTimeout(renderAll,25);}

// ════ FIREBASE LISTENERS ════
if(db){
  db.ref('heats').once('value',function(s){
    HEATS=s.val()||{};renderAll();startSharedClock();
    db.ref('heats').on('child_changed',function(snap){
      var hid=snap.key,h=snap.val();
      if(!h){delete HEATS[hid];}else{
        var prev=HEATS[hid]||{},ps=prev.status||null;
        HEATS[hid]=Object.assign({},prev,h);
        if(!h.lanes&&prev.lanes)HEATS[hid].lanes=prev.lanes;
        if(!h.scores&&prev.scores)HEATS[hid].scores=prev.scores;
        if(!h.startTimestamp&&prev.startTimestamp)HEATS[hid].startTimestamp=prev.startTimestamp;
        if(h.status&&h.status!==ps){
          _ds[1]=null;_ds[2]=null;
          if(h.status==='pending'||h.status==='pre') delete _podiumShown[hid];
          if(h.status==='done'||h.status==='timecap'){
            var zone=parseInt(h.catZone!=null?h.catZone:h.zone)||1;
            var ihD=IH[String(zone)],ihSec=ihD&&ihD.active&&ihD.target>now()?Math.round((ihD.target-now())/1000):0;
            setTimeout(function(){showPodium(zone,hid,HEATS[hid]||h,ihSec>30?Math.min(ihSec-10,60):20);},1500);
          }
        }
      }
      scheduleRender();
    });
    db.ref('heats').on('child_added',function(snap){HEATS[snap.key]=snap.val();scheduleRender();});
  });
  (function(){
    var _d=null;
    function onSc(s){var k=s.key,v=s.val();if(v)SCORES[k]=v;else delete SCORES[k];clearTimeout(_d);_d=setTimeout(scheduleRender,40);}
    db.ref('scores').once('value',function(s){SCORES=s.val()||{};scheduleRender();db.ref('scores').on('child_changed',onSc);db.ref('scores').on('child_added',onSc);});
  })();
  db.ref('system/zoneSync').on('value',function(s){ZSYNC=s.val()||{};_ds[1]=null;_ds[2]=null;scheduleRender();});
  db.ref('system/interheat').on('value',function(s){IH=s.val()||{};_ds[1]=null;_ds[2]=null;scheduleRender();});
  [1,2].forEach(function(z){db.ref('system/countdown/z'+z).on('value',function(snap){var cd=snap.val();CD[String(z)]=(cd&&cd.active&&cd.target>now())?cd:null;_ivKey[z]=null;scheduleRender();});});
  db.ref('system/podiumSlideshow').on('value',function(s){var p=s.val()||{};if(p.active&&p.slide)showTKPodiumSlide(p.slide,p.idx,p.total,p.step);else{[1,2].forEach(function(zone){var ov=document.getElementById('pod-z'+zone);if(ov&&!ov._localPod)ov.className='pod-overlay';});}});
  db.ref('.info/connected').on('value',function(s){if(s.val()===true)db.ref('heats').once('value').then(function(snap){HEATS=snap.val()||{};_dh={1:null,2:null};renderAll();});});
  var _mcdIv=null;
  db.ref('system/morningCountdown').on('value',function(s){
    var d=s.val()||{};
    var el=document.getElementById('morning-cd');
    var val=document.getElementById('mcd-val');
    var sub=document.getElementById('mcd-sub');
    clearInterval(_mcdIv);
    if(!d.active||!d.target){if(el)el.className='';return;}
    if(el)el.className='on';
    function tick(){
      var rem=Math.ceil((d.target-now())/1000);
      if(rem<=0){
        if(val){val.textContent='GO !';val.className='mcd-val go';}
        if(sub)sub.textContent='C\'est parti !';
        clearInterval(_mcdIv);
        // Reset _dh pour forcer le rebuild des zones au GO
        _dh[1]=null;_dh[2]=null;
        setTimeout(function(){
          if(el)el.className='';
          scheduleRender();
        },2500);
        return;
      }
      var m=Math.floor(rem/60),ss=rem%60;
      if(val){val.textContent=m+':'+p2(ss);val.className='mcd-val'+(rem<=10?' hot':rem<=30?' warn':'');}
      if(sub)sub.textContent=rem<=10?'Attention…':'Préparation en cours…';
    }
    tick();
    _mcdIv=setInterval(tick,200);
  });
} else {
  // Firebase indisponible — afficher message d'erreur dans les zones
  window.addEventListener('DOMContentLoaded',function(){
    startSharedClock();
    [1,2].forEach(function(z){
      var root=document.getElementById('z'+z);
      if(root) root.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;font-family:var(--ff);font-size:18px;letter-spacing:3px;color:var(--err)">⚠ FIREBASE INDISPONIBLE</div>';
    });
  });
}

setInterval(function(){var n=new Date(),el=document.getElementById('clk');if(el)el.textContent=p2(n.getHours())+':'+p2(n.getMinutes())+':'+p2(n.getSeconds());},1000);
setInterval(scheduleRender,5000);
</script>
